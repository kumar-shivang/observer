services:

  # ── Observer (Python brain) ──────────────────────────────────────────────
  observer:
    build: .
    container_name: observer
    restart: unless-stopped
    pid: host                  # CRITICAL: see host /proc
    privileged: true           # needed for full process visibility
    volumes:
      - /proc:/proc            # host proc (belt + suspenders alongside --pid=host)
      - /etc/passwd:/etc/passwd:ro   # resolve UIDs → usernames
      - /etc/group:/etc/group:ro     # resolve GIDs → group names
      - ./data:/data                 # SQLite on host disk (survives down -v)
    environment:
      COLLECT_INTERVAL: "60"          # seconds between collection cycles
      ABUSE_GPU_MEM_MB: "10000"       # MB; alert if any user exceeds this
      ABUSE_CPU_PERCENT: "200"        # %; alert if any user exceeds this
      RETENTION_DAYS: "7"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "127.0.0.1:8000:8000"   # public metrics + JSON API
      - "127.0.0.1:8001:8001"   # admin backdoor (localhost only)
    networks:
      - monitor-net

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"          # required for TSDB delete_series
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - observer
    networks:
      - monitor-net

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: "https://gyansetu.shivangkumar.com/observer"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitor-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitor-net:
    driver: bridge
